name: Keep Supabase Alive

on:
  schedule:
    # Runs every Monday and Thursday at 8:00 AM UTC
    - cron: '0 8 * * 1,4'
  workflow_dispatch: # Also allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://enhmridgqnagwwypnayn.supabase.co/rest/v1/roster?select=name&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuaG1yaWRncW5hZ3d3eXBuYXluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjMyODgsImV4cCI6MjA5MzkzOTI4OH0.sY9BTE5fVbhDVQjCxsiRYyQTM-89EzzEtTDeLBgJBUY" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuaG1yaWRncW5hZ3d3eXBuYXluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjMyODgsImV4cCI6MjA5MzkzOTI4OH0.sY9BTE5fVbhDVQjCxsiRYyQTM-89EzzEtTDeLBgJBUY")
          echo "Supabase response: $response"
          if [ "$response" = "200" ]; then
            echo "✅ Supabase is alive and responding"
          else
            echo "⚠️ Unexpected response code: $response"
            exit 1
          fi
